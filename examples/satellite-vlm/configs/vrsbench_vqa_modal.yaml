project_name: "vrsbench-vqa"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/satellite-vlm/data/vrsbench/vrsbench_vqa_train.jsonl"
  type: "vlm_sft"
  test_size: 0.05
  image_root: "/satellite-vlm/data/vrsbench/images"
  # limit: 3000  # uncomment for quick testing

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  eval_on_start: true
  eval_strategy: "steps"
  eval_steps: 1000
  save_strategy: "steps"
  save_steps: 1000
  logging_steps: 20
  tracker: "wandb"

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false

benchmarks:
  max_new_tokens: 50
  image_root: "/satellite-vlm/data/vrsbench/images"
  benchmarks:
    - name: "vrsbench_vqa_eval"
      path: "/satellite-vlm/data/vrsbench/vrsbench_vqa_eval.jsonl"
      metric: "short_answer"
      max_new_tokens: 50
      limit: 500

modal:
  app_name: "satellite-vlm"
  gpu: "H100"
  timeout: 86400                        # 24 hours
  output_volume: "satellite-vlm"        # Modal Volume (created automatically)
  output_dir: "/satellite-vlm"          # mount point; data lives here too
  detach: false                         # stream logs to your terminal
  secrets:
    - "wandb-secret"
